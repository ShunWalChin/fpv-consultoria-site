<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" role="img" aria-label="WO Agency">
  <title>WO Agency</title>
  <defs>
    <linearGradient id="wo-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5BB7F0"/>
      <stop offset="100%" stop-color="#1B6FB3"/>
    </linearGradient>
    <linearGradient id="wo-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFB266"/>
      <stop offset="100%" stop-color="#E96A1A"/>
    </linearGradient>
    <linearGradient id="wo-arrow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#1B6FB3"/>
      <stop offset="100%" stop-color="#7FCBFF"/>
    </linearGradient>
  </defs>
  <!-- Stylized W -->
  <path d="M30 60 L70 200 L110 110 L150 200 L190 60"
        fill="none" stroke="url(#wo-blue)" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- O ring -->
  <circle cx="225" cy="135" r="55" fill="none" stroke="url(#wo-orange)" stroke-width="30"/>
  <!-- Arrow swoosh through center -->
  <path d="M150 200 Q200 80 240 60 L240 90 L260 60 L240 30 L240 50"
        fill="none" stroke="url(#wo-arrow)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="232,30 252,60 232,60" fill="#7FCBFF"/>
  <!-- Wordmark -->
  <text x="320" y="138" fill="#1A1A1A" font-family="Inter, Arial, sans-serif"
        font-size="92" font-weight="900" letter-spacing="2">WO</text>
  <text x="320" y="190" fill="#7A7A7A" font-family="Inter, Arial, sans-serif"
        font-size="38" font-weight="500" letter-spacing="12">agency</text>
</svg>
