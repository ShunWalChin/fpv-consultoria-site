<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" role="img" aria-label="Imunitá - Clínica de Imunização">
  <title>Imunitá</title>
  <!-- Symbol: open square + medical cross + I -->
  <g stroke="#4A2E20" stroke-width="9" fill="none">
    <path d="M14 14 V186 H110"/>
    <path d="M14 14 H70"/>
  </g>
  <!-- Brown vertical bar (I) -->
  <rect x="50" y="46" width="22" height="118" fill="#7B4A2D"/>
  <!-- Medical cross (gold/brown) -->
  <rect x="78"  y="14" width="20" height="56" fill="#B8884A"/>
  <rect x="62"  y="30" width="52" height="22" fill="#B8884A"/>
  <!-- Wordmark -->
  <text x="140" y="108" fill="#3A2418" font-family="Inter, Arial, sans-serif"
        font-size="78" font-weight="900" letter-spacing="2">IMUNITÁ</text>
  <line x1="140" y1="128" x2="446" y2="128" stroke="#7B4A2D" stroke-width="3"/>
  <text x="140" y="170" fill="#3A2418" font-family="Inter, Arial, sans-serif"
        font-size="26" font-weight="400">Clínica de Imunização</text>
</svg>
